spring:
  application:
    name: tech-mart-micro
  datasource:
    url: jdbc:h2:mem:techmart
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
server:
  port: ${PORT:8080}
