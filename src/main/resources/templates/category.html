<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${category?.name} + ' : Tech Mart Micro'">Category</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
<link th:href="@{/" rel="stylesheet"><!-- reuse index styles via inline -->
<style>
:root{--brand:#0056a6;--accent:#f5a623;--dark:#1a1a1a;--text:#333;--text-light:#666;--border:#e0e0e0;--bg-light:#f5f5f5;--green:#28a745}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Open Sans',sans-serif;font-size:14px;color:var(--text)}a{color:var(--brand);text-decoration:none}
.top-bar{background:var(--brand);color:#fff;text-align:center;padding:8px;font-weight:600;font-size:13px}
.header{background:#fff;border-bottom:1px solid var(--border);padding:12px 0}.header-inner{max-width:1280px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:16px}
.logo{font-size:24px;font-weight:700;color:var(--brand)}.logo span{color:var(--accent)}
.search-box{flex:1;display:flex;max-width:500px}.search-box input{flex:1;border:2px solid var(--brand);border-right:none;border-radius:4px 0 0 4px;padding:8px 12px;font-size:14px;outline:none}.search-box button{background:var(--brand);color:#fff;border:2px solid var(--brand);border-radius:0 4px 4px 0;padding:8px 16px;cursor:pointer;font-size:16px}
.nav{background:var(--brand)}.nav-inner{max-width:1280px;margin:0 auto;padding:0 16px;display:flex}.nav a{color:#fff;padding:10px 16px;font-size:13px;font-weight:600}
.cat-layout{max-width:1280px;margin:24px auto;padding:0 16px;display:grid;grid-template-columns:240px 1fr;gap:24px}
.sidebar h3{font-size:16px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:3px solid var(--brand)}
.sidebar a{display:block;padding:6px 0;color:var(--text);font-size:13px}.sidebar a:hover,.sidebar .active{color:var(--brand);font-weight:700}
.breadcrumb{font-size:13px;color:var(--text-light);margin-bottom:16px}
.result-count{background:var(--brand);color:#fff;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:700;float:right}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.product-card{background:#fff;border:1px solid var(--border);border-radius:4px;padding:16px;transition:box-shadow .2s}
.product-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.15)}
.product-card .name{font-size:14px;font-weight:600;margin-bottom:8px;line-height:1.4;min-height:40px}.product-card .name a{color:var(--text)}
.product-card .price{font-size:28px;font-weight:700}.product-card .desc{font-size:12px;color:var(--text-light);margin:8px 0}
.in-stock{color:var(--green);font-size:12px;margin-top:8px}.low-stock{color:var(--accent);font-size:12px;margin-top:8px}
.btn-cart{display:block;background:var(--brand);color:#fff;text-align:center;padding:8px;border-radius:4px;font-weight:600;font-size:13px;margin-top:12px;border:none;cursor:pointer;width:100%}.btn-cart:hover{background:#004080}
@media(max-width:768px){.cat-layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<div th:replace="~{fragments/header :: site-header}"></div>
<div class="cat-layout">
  <div class="sidebar">
    <h3>Categories</h3>
    <a th:each="c : ${categories}" th:href="@{/category/{id}(id=${c.id})}" th:text="${c.name}" th:classappend="${category != null and c.id == category.id} ? 'active' : ''">Cat</a>
  </div>
  <div>
    <div class="breadcrumb">
      <a href="/">Home</a> &gt; <span th:text="${category?.name}">Category</span>
      <span class="result-count" th:text="${#lists.size(products)} + ' Product(s) found'">0</span>
    </div>
    <h1 style="font-size:24px;margin-bottom:16px" th:text="${category?.name}">Category</h1>
    <div class="product-grid">
      <div th:each="p : ${products}" class="bg-white border rounded-lg p-4 hover:shadow-lg">
        <div class="name"><a th:href="@{/product/{id}(id=${p.id})}" th:text="${p.name}">Product</a></div>
        <img th:src="${p.imageUrl}" alt="Product Image" style="width:100%;height:auto;margin-bottom:8px;"/>
        <div class="desc" th:text="${p.description}">Desc</div>
        <div class="price">$<span th:text="${#numbers.formatDecimal(p.price, 1, 2)}">0.00</span></div>
        <div th:classappend="${p.stock > 20 ? 'in-stock' : 'low-stock'}">
          <span th:if="${p.stock > 20}">&#10003; In Stock</span>
          <span th:if="${p.stock <= 20 and p.stock > 0}">&#9888; Limited</span>
        </div>
        <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Add to Cart</button>
      </div>
    </div>
  </div>
</div>
<div th:replace="~{fragments/footer :: site-footer}"></div>
</body>
</html>
