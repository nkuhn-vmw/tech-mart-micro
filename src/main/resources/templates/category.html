<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${category?.name} + ' : Tech Mart Micro'">Category</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans">
<div th:replace="~{fragments/header :: site-header}"></div>
<div class="cat-layout container mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-4 gap-6">
  <div class="lg:col-span-1 sidebar">
    <h3 class="text-lg font-bold mb-4 pb-2 border-b border-gray-300">Categories</h3>
    <a th:each="c : ${categories}" th:href="@{/category/{id}(id=${c.id})}" th:text="${c.name}" th:classappend="${category != null and c.id == category.id} ? 'text-blue-600 font-bold' : 'text-gray-700 hover:text-blue-600'" class="block py-2">Cat</a>
  </div>
  <div class="lg:col-span-3">
    <div class="breadcrumb flex items-center text-sm text-gray-600 mb-4">
      <a href="/" class="text-blue-600 hover:underline">Home</a> &gt; <span th:text="${category?.name}" class="ml-1">Category</span>
      <span class="bg-blue-600 text-white px-3 py-1 rounded-full text-xs ml-auto font-bold" th:text="${#lists.size(products)} + ' Product(s) found'">0</span>
    </div>
    <h1 class="text-2xl font-bold mb-6" th:text="${category?.name}">Category</h1>
    <div class="product-grid grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <div th:each="p : ${products}" class="bg-white border rounded-lg p-4 hover:shadow-lg transition-shadow">
        <div class="name font-bold mb-2"><a th:href="@{/product/{id}(id=${p.id})}" th:text="${p.name}" class="text-gray-900 hover:text-blue-600">Product</a></div>
        <img th:src="${p.imageUrl}" alt="Product Image" class="w-full h-48 object-contain mb-3"/>
        <div class="desc text-gray-600 text-sm mb-3" th:text="${p.description}">Desc</div>
        <div class="price font-bold text-lg mb-2">$<span th:text="${#numbers.formatDecimal(p.price, 1, 2)}">0.00</span></div>
        <div th:classappend="${p.stock > 20 ? 'in-stock' : 'low-stock'}" class="mb-3">
          <span th:if="${p.stock > 20}" class="text-green-600">&#10003; In Stock</span>
          <span th:if="${p.stock <= 20 and p.stock > 0}" class="text-orange-500">&#9888; Limited — <span th:text="${p.stock}">0</span> left</span>
        </div>
        <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded w-full">Add to Cart</button>
      </div>
    </div>
  </div>
</div>
<div th:replace="~{fragments/footer :: site-footer}"></div>
</body>
</html>
