<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Results - Tech Mart Micro</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans">
<div th:replace="~{fragments/header :: site-header}"></div>
<div class="content container mx-auto px-4 py-6">
  <h1 class="text-2xl font-bold mb-6"><span th:text="${#lists.size(products)}">0</span> results for "<span th:text="${query}">query</span>"</h1>
  <div th:if="${#lists.isEmpty(products)}" class="py-8 text-center text-gray-600">No products found. Try a different search.</div>
  <div class="grid gap-6 grid-cols-1 sm:grid-cols-2 lg:grid-cols-4">
    <div th:each="p : ${products}" class="bg-white border rounded-lg p-4 hover:shadow-lg transition-shadow">
      <div class="name font-bold mb-2"><a th:href="@{/product/{id}(id=${p.id})}" th:text="${p.name}" class="text-gray-900 hover:text-blue-600">Product</a></div>
      <div class="desc text-gray-600 text-sm mb-3" th:text="${p.description}">Desc</div>
      <div class="price font-bold text-lg mb-3">$<span th:text="${#numbers.formatDecimal(p.price,1,2)}">0.00</span></div>
      <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded w-full">Add to Cart</button>
    </div>
  </div>
</div>
<div th:replace="~{fragments/footer :: site-footer}"></div>
</body>
</html>
