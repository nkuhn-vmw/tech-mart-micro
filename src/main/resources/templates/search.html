<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Results - Tech Mart Micro</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  /* Custom Tailwind configuration */
  :root {
    --brand: #0056a6;
    --accent: #f5a623;
    --dark: #1a1a1a;
    --text: #333;
    --text-light: #666;
    --border: #e0e0e0;
    --bg-light: #f5f5f5;
    --green: #28a745;
    --red: #cc0000;
  }
  
  /* Override some Tailwind defaults for consistency */
  .btn-cart {
    @apply w-full bg-blue-600 text-white text-center py-2 rounded-lg font-semibold text-sm mt-3 hover:bg-blue-800;
  }
  
  .product-card {
    @apply bg-white border border-gray-200 rounded-lg p-4 transition hover:shadow-lg relative;
  }
  
  .product-name {
    @apply font-semibold text-sm mb-2 min-h-[40px] leading-1.4;
  }
  
  .product-name a {
    @apply text-gray-800 hover:text-blue-600;
  }
  
  .product-price {
    @apply text-2xl font-bold text-gray-800;
  }
  
  .product-description {
    @apply text-xs text-gray-500 mb-2;
  }
  
  .save-badge {
    @apply text-orange-500 font-bold;
  }
</style>
</head>
<body>
<div class="bg-blue-600 text-white text-center py-2 font-semibold text-sm">Free shipping on orders over $99</div>
<div class="bg-white border-b border-gray-200 py-3">
  <div class="max-w-6xl mx-auto px-4 flex items-center gap-4">
    <a href="/" class="text-2xl font-bold text-blue-600 whitespace-nowrap">
      TECH<span class="text-orange-500">MART</span>
    </a>
    <form class="flex-1 max-w-md flex">
      <input type="text" name="q" th:value="${query}" placeholder="What can we help you find?" class="flex-1 border-2 border-blue-600 border-r-0 rounded-l-lg px-3 py-2 text-sm outline-none">
      <button type="submit" class="bg-blue-600 text-white border-2 border-blue-600 rounded-r-lg px-4 py-2 cursor-pointer text-lg">🔍</button>
    </form>
  </div>
</div>
<div class="max-w-6xl mx-auto px-4 mt-6">
  <h1 class="text-xl font-bold mb-4">
    <span th:text="${#lists.size(products)}">0</span> results for "<span th:text="${query}">query</span>"
  </h1>
  <div th:if="${#lists.isEmpty(products)}" class="p-8 text-center text-gray-500">No products found. Try a different search.</div>
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
    <div th:each="p : ${products}" class="product-card">
      <div class="product-name">
        <a th:href="@{/product/{id}(id=${p.id})}" th:text="${p.name}">Product</a>
      </div>
      <div class="product-description" th:text="${p.description}">Desc</div>
      <div class="product-price">$<span th:text="${#numbers.formatDecimal(p.price, 1, 2)}">0.00</span><sup class="text-sm align-super">99</sup></div>
      <button class="btn-cart">Add to Cart</button>
    </div>
  </div>
</div>
</body>
</html>
