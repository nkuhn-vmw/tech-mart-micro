<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${product?.name} + ' - Tech Mart Micro'">Product</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans">
<div th:replace="~{fragments/header :: site-header}"></div>
<div class="breadcrumb container mx-auto px-4 py-3 text-sm text-gray-600">
  <a href="/" class="text-blue-600 hover:underline">Home</a> &gt; 
  <a th:if="${product?.category}" th:href="@{/category/{id}(id=${product.category.id})}" th:text="${product.category.name}" class="text-blue-600 hover:underline">Category</a> &gt; 
  <span th:text="${product?.name}" class="ml-1">Product</span>
</div>
<div class="pdp container mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-8" th:if="${product}">
  <div class="pdp-gallery bg-gray-100 rounded-lg p-8 text-center">
    <img th:src="${product.imageUrl}" alt="Product Image" class="max-w-full h-64 object-contain mx-auto"/>
  </div>
  <div class="pdp-info">
    <div class="brand text-blue-600 font-bold mb-3" th:if="${product.category}" th:text="${product.category.name}">Brand</div>
    <h1 class="text-2xl font-bold mb-4" th:text="${product.name}">Product Name</h1>
    <div class="mb-4 text-orange-500">&#9733;&#9733;&#9733;&#9733;&#9734; 4.2 (47 reviews)</div>
    <div class="features mb-6">
      <h3 class="text-lg font-bold mb-3 pb-2 border-b border-gray-300">Key Features</h3>
      <ul class="list-disc pl-5">
        <li class="text-gray-700" th:text="${product.description}">Feature</li>
      </ul>
    </div>
    <div class="specs mb-6">
      <h3 class="text-lg font-bold mb-3 pb-2 border-b border-gray-300">Specifications</h3>
      <table class="w-full text-sm border-collapse">
        <thead>
          <tr class="border-b">
            <th class="text-left py-2 px-2">Group</th>
            <th class="text-left py-2 px-2">Name</th>
            <th class="text-left py-2 px-2">Value</th>
          </tr>
        </thead>
        <tbody th:each="spec : ${product.specifications}">
          <tr class="border-b">
            <td class="py-2 px-2" th:text="${spec.specGroup}"></td>
            <td class="py-2 px-2" th:text="${spec.specName}"></td>
            <td class="py-2 px-2" th:text="${spec.specValue}"></td>
          </tr>
        </tbody>
      </table>
    </div>
    <div th:text="${stockMessage}" class="mt-3 font-bold text-blue-600">Stock info</div>
  </div>
  <div class="pdp-buy bg-white border rounded-lg p-6">
    <div class="return bg-gray-100 p-3 rounded text-center text-sm mb-4">&#8635; MAY BE RETURNED WITHIN 30 DAYS</div>
    <div class="price font-bold text-3xl mb-4">$<span th:text="${#numbers.formatInteger(product.price.intValue(), 1)}">0</span><sup th:text="${#strings.substring(#numbers.formatDecimal(product.price, 1, 2), #numbers.formatDecimal(product.price, 1, 2).indexOf('.') + 1)}" class="text-base">99</sup></div>
    <div class="stock mb-4">
      <span th:if="${product.stock > 20}" class="text-green-600">&#10003; In Stock</span>
      <span th:if="${product.stock <= 20 and product.stock > 0}" class="text-orange-500">&#9888; Limited — <span th:text="${product.stock}">0</span> left</span>
    </div>
    <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded w-full flex items-center justify-center">
      <span>&#128722;</span>
      <span class="ml-2">Add to Cart</span>
    </button>
    <div class="mt-3 text-sm text-gray-600 text-center">&#9200; 18 MINUTE IN-STORE PICKUP</div>
  </div>
</div>
<div th:replace="~{fragments/footer :: site-footer}"></div>
</body>
</html>
