<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="${product?.name} + ' - Tech Mart Micro'">Product</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  /* Custom Tailwind configuration */
  :root {
    --brand: #0056a6;
    --accent: #f5a623;
    --dark: #1a1a1a;
    --text: #333;
    --text-light: #666;
    --border: #e0e0e0;
    --bg-light: #f5f5f5;
    --green: #28a745;
    --red: #cc0000;
  }
  
  /* Override some Tailwind defaults for consistency */
  .btn-cart {
    @apply w-full bg-blue-600 text-white text-center py-3 rounded-lg font-bold text-lg mt-4 hover:bg-blue-800;
  }
  
  .product-price {
    @apply text-4xl font-bold text-gray-800;
  }
  
  .product-stock {
    @apply mt-3 text-sm;
  }
  
  .in-stock {
    @apply text-green-500;
  }
  
  .low-stock {
    @apply text-orange-500;
  }
  
  .save-badge {
    @apply text-orange-500 font-bold;
  }
</style>
</head>
<body>
<div class="bg-blue-600 text-white text-center py-2 font-semibold text-sm">Free 60-Day Tech Support on all purchases</div>
<div class="bg-white border-b border-gray-200 py-3">
  <div class="max-w-6xl mx-auto px-4 flex items-center gap-4">
    <a href="/" class="text-2xl font-bold text-blue-600 whitespace-nowrap">
      TECH<span class="text-orange-500">MART</span>
    </a>
  </div>
</div>
<div class="bg-blue-600">
  <div class="max-w-6xl mx-auto px-4 flex">
    <a href="/" class="text-white px-4 py-2 text-sm font-semibold block transition hover:bg-white hover:bg-opacity-15">Home</a>
    <a href="#" class="text-white px-4 py-2 text-sm font-semibold block transition hover:bg-white hover:bg-opacity-15">Top Deals</a>
  </div>
</div>
<div class="breadcrumb max-w-6xl mx-auto px-4 mt-3 text-sm text-gray-500">
  <a href="/" class="hover:text-blue-600">Home</a> &gt; 
  <a th:if="${product?.category}" th:href="@{/category/{id}(id=${product.category.id})}" th:text="${product.category.name}" class="hover:text-blue-600">Category</a> &gt; 
  <span th:text="${product?.name}" class="text-gray-700">Product</span>
</div>
<div class="max-w-6xl mx-auto px-4 mt-6 grid grid-cols-1 lg:grid-cols-3 gap-8" th:if="${product}">
  <div class="bg-gray-100 rounded-lg p-12 text-center">
    <div class="text-6xl text-gray-400">💻</div>
  </div>
  <div class="pdp-info">
    <div class="text-blue-600 font-semibold mb-3" th:if="${product.category}" th:text="${product.category.name}">Brand</div>
    <h1 class="text-2xl font-bold mb-2" th:text="${product.name}">Product Name</h1>
    <div class="mb-4 text-orange-500">⭐⭐⭐⭐☆ 4.2 (47 reviews)</div>
    <div class="features">
      <h3 class="text-lg font-bold mb-3 pb-2 border-b-2 border-gray-200">Key Features</h3>
      <ul class="list-disc pl-5 leading-6 text-sm">
        <li th:text="${product.description}" class="text-gray-700">Feature</li>
      </ul>
    </div>
  </div>
  <div class="pdp-buy border border-gray-200 rounded-lg p-6">
    <div class="bg-gray-100 p-3 rounded-lg text-center text-sm mb-4">↩️ MAY BE RETURNED WITHIN 30 DAYS</div>
    <div class="product-price">$<span th:text="${#numbers.formatInteger(product.price.intValue(), 1)}">0</span><sup class="text-xl align-super" th:text="${#strings.substring(#numbers.formatDecimal(product.price, 1, 2), #numbers.formatDecimal(product.price, 1, 2).indexOf('.') + 1)}">99</sup></div>
    <div class="product-stock" th:classappend="${product.stock > 20 ? 'in-stock' : 'low-stock'}">
      <span th:if="${product.stock > 20}">✓ In Stock</span>
      <span th:if="${product.stock <= 20}">⚠ Limited — <span th:text="${product.stock}">0</span> left</span>
    </div>
    <button class="btn-cart">🛒 Add to Cart</button>
    <div class="mt-3 text-sm text-gray-500 text-center">🚚 18 MINUTE IN-STORE PICKUP</div>
  </div>
</div>
</body>
</html>
