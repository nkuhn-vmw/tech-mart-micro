<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Mart Micro</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link th:href="@{/static/css/style.css}" rel="stylesheet" />
<style>
:root{--brand:#0056a6;--accent:#f5a623;--dark:#1a1a1a;--header-bg:#002d6a;--search-bg:#f5a623;--text:#333;--text-light:#666;--border:#e0e0e0;--bg-light:#f5f5f5;--green:#28a745;--red:#cc0000}
/* existing inline styles omitted for brevity */
</style>
</head>
<body>
<div th:replace="~{fragments/header :: site-header}"></div>

<!-- Hero Banner -->
<div class="hero-banner">
  <h1 th:text="${featuredProducts[0].name}">Featured Product</h1>
  <div class="price">
    $<span th:text="${#numbers.formatInteger(featuredProducts[0].price.intValue(),1)}">0</span><sup th:text="${#strings.substringAfter(#numbers.formatDecimal(featuredProducts[0].price,1,2),'.')}">99</sup>
  </div>
  <span class="save-badge">SAVE $100</span>
  <a th:href="@{/product/{id}(id=${featuredProducts[0].id})}" class="shop-now">SHOP NOW &#9654;</a>
</div>

<!-- Shell Shocker Deal of the Day -->
<div class="shell-shocker">
  <div class="header-bar">Shell Shocker — Deal of the Day</div>
  <div class="product-card" th:if="${deals.size() > 0}">
    <a th:href="@{/product/{id}(id=${deals[0].id})}">
      <img th:src="${deals[0].imageUrl}" alt="Deal Image" />
    </a>
    <div class="title" th:text="${deals[0].name}">Deal Product</div>
    <div class="price">
      $<span th:text="${#numbers.formatInteger(deals[0].price.intValue(),1)}">0</span><sup th:text="${#strings.substringAfter(#numbers.formatDecimal(deals[0].price,1,2),'.')}">99</sup>
    </div>
  </div>
</div>

<div class="section">
  <h2>Shop by Category</h2>
  <div class="cat-grid">
    <a th:each="cat : ${categories}" th:href="@{/category/{id}(id=${cat.id})}" class="cat-tile">
      <span class="icon">&#128187;</span>
      <span th:text="${cat.name}">Category</span>
    </a>
  </div>
</div>

<div class="section">
  <h2>Featured Products <a href="#">See All</a></h2>
  <div class="product-grid">
    <div th:each="p : ${featuredProducts}" class="product-card">
      <div class="name"><a th:href="@{/product/{id}(id=${p.id})}" th:text="${p.name}">Product</a></div>
      <div class="desc" th:text="${p.description}">Description</div>
      <div class="price">$<span th:text="${#numbers.formatDecimal(p.price,1,2)}">0.00</span></div>
      <div class="stock" th:classappend="${p.stock > 20 ? 'in-stock' : 'low-stock'}">
        <span th:if="${p.stock > 20}">&#10003; In Stock</span>
        <span th:if="${p.stock <= 20 and p.stock > 0}">&#9888; Limited — <span th:text="${p.stock}">0</span> left</span>
      </div>
      <form th:action="@{/cart/add}" method="post">
        <input type="hidden" name="productId" th:value="${p.id}" />
        <input type="hidden" name="quantity" value="1" />
        <button type="submit" class="btn-cart">Add to Cart</button>
      </form>
    </div>
  </div>
</div>

<div th:replace="~{fragments/footer :: site-footer}"></div>
</body>
</html>
